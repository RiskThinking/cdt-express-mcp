name: Release distributable MCPB

on:
  push:
    tags:
      - 'v*'

jobs:
  release-mcpb:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for mcp-publisher OIDC authentication
      contents: write # Required to upload artifacts to GitHub Releases

    steps:
      - uses: actions/checkout@v6

      - name: Verify version consistency
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          PKG_VER="$(jq -r '.version' package.json)"

          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "❌ Version mismatch between tag ($TAG_VER) and package ($PKG_VER)"
            exit 1
          else
            echo "✅ Version ($TAG_VER) is consistent with package.json"
          fi

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - run: npm ci

      # sync manifest.json version with package.json and package the MCPB extension
      - run: npm run pack

      # upload MCPB extension to the GitHub release
      - uses: softprops/action-gh-release@v3
        with:
          files: cdt-express.mcpb
          generate_release_notes: true
          append_body: false

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Inject MCPB properties into server.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Version: $VERSION"

          # update server.json with the version, sha256, and download url (identifier)
          SHA256=$(sha256sum cdt-express.mcpb | awk '{print $1}')
          echo "Calculated SHA256: $SHA256"

          DOWNLOAD_URL="https://github.com/RiskThinking/cdt-express-mcp/releases/download/${GITHUB_REF_NAME}/cdt-express.mcpb"
          echo "Download URL: $DOWNLOAD_URL"

          jq --arg ver "$VERSION" --arg sha "$SHA256" --arg url "$DOWNLOAD_URL" \
            '.version = $ver |
             .packages[0].version = $ver |
             .packages[0].fileSha256 = $sha |
             .packages[0].identifier = $url' \
            server.json > server.tmp.json

          mv server.tmp.json server.json

          echo "Updated server.json:"
          cat server.json

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
